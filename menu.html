<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Меню</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C1440E;--bg:#FBF8F4;--bg2:#F4EFE8;--card:#FFFFFF;
  --text:#1A1208;--muted:#7A6E62;--border:#E0D8CE;
  --radius:14px;--font-head:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;--font-size:15px;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:var(--font-size)}
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:.75rem}
.loader-logo{font-family:var(--font-head);font-size:1.5rem;color:var(--accent)}
.loader-spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader.gone{display:none}
/* BANNER — дві зони: фото зверху, інфо знизу */
.banner-photo{width:100%;height:160px;background:var(--accent);position:relative;overflow:hidden}
.banner-photo img{width:100%;height:100%;object-fit:cover;display:block}
.banner-photo-placeholder{width:100%;height:100%;background:var(--accent)}
.venue-header{background:var(--card);border-bottom:1px solid var(--border);padding:.875rem 1rem;display:flex;align-items:center;gap:.875rem}
.venue-logo{width:52px;height:52px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;overflow:hidden;border:2px solid var(--border)}
.venue-logo img{width:100%;height:100%;object-fit:cover}
.venue-name{font-family:var(--font-head);font-size:1.15rem;color:var(--text);font-weight:600;line-height:1.2}
.venue-tag{font-size:12px;color:var(--muted);margin-top:.2rem}
.cat-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.625rem 1rem;display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{padding:5px 14px;border-radius:20px;font-size:13px;border:1px solid var(--border);white-space:nowrap;cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s;font-family:var(--font-body);flex-shrink:0}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.menu-body{padding:.875rem;max-width:640px;margin:0 auto;padding-bottom:100px}
.dish-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;gap:.875rem;padding:.875rem;margin-bottom:.625rem;cursor:pointer;transition:box-shadow .15s;position:relative}
.dish-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.dish-img{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg2)}
.dish-img-ph{width:80px;height:80px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0}
.dish-body{flex:1;min-width:0}
.dish-name{font-weight:600;font-size:14px;color:var(--text);line-height:1.3}
.dish-desc{font-size:12px;color:var(--muted);margin-top:.25rem;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dish-weight{font-size:11px;color:var(--muted);margin-top:.25rem}
.dish-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem}
.dish-price{font-family:var(--font-head);font-size:1.05rem;color:var(--accent);font-weight:600}
.add-btn{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1}
.add-btn:active{transform:scale(.9)}
.add-btn.added{background:#2D6A4F;font-size:.8rem}
.qty-chip{position:absolute;top:.5rem;right:.5rem;background:var(--accent);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:10px auto}
.det-img{width:100%;max-height:380px;object-fit:contain;background:#f5f0eb}
.det-body{padding:1rem}
.det-name{font-family:var(--font-head);font-size:1.3rem;margin-bottom:.375rem}
.det-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:.875rem}
.det-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:.875rem}
.det-price{font-family:var(--font-head);font-size:1.4rem;color:var(--accent);font-weight:600}
.qty-ctrl{display:flex;align-items:center;gap:.625rem}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.qty-val{font-size:15px;font-weight:600;min-width:22px;text-align:center}
.add-cart-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.cart-fab{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.75rem;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:all .25s;white-space:nowrap;font-family:var(--font-body);z-index:40}
.cart-fab.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px)}
.cart-badge{background:rgba(255,255,255,.25);border-radius:12px;padding:2px 10px;font-size:13px}
.cart-list{display:flex;flex-direction:column;gap:.5rem;max-height:240px;overflow-y:auto;margin-bottom:.875rem}
.cart-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
.cart-row:last-child{border:none}
.c-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--bg2);flex-shrink:0}
.c-img-ph{width:40px;height:40px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:500}
.c-price{font-size:12px;color:var(--muted)}
.c-qty{display:flex;align-items:center;gap:.375rem}
.cq-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.cq-val{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.cart-total{display:flex;justify-content:space-between;font-weight:600;font-size:15px;border-top:1px solid var(--border);padding-top:.75rem;margin-bottom:.875rem}
.cart-total-price{color:var(--accent);font-family:var(--font-head)}
.fl{display:flex;flex-direction:column;gap:.625rem;margin-bottom:.875rem}
.fl label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fl input,.fl textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font-body);outline:none;color:var(--text);background:var(--bg)}
.fl input:focus,.fl textarea:focus{border-color:var(--accent)}
.order-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.order-btn:disabled{opacity:.5;cursor:not-allowed}
.success{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;z-index:200}
.success.open{display:flex}
.s-icon{font-size:4rem;margin-bottom:1rem}
.s-title{font-family:var(--font-head);font-size:1.5rem;margin-bottom:.5rem}
.s-num{font-family:var(--font-head);font-size:2rem;color:var(--accent);background:var(--bg2);border-radius:10px;padding:.5rem 1.5rem;margin:1rem 0}
.s-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
.back-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.625rem;opacity:.4}
.toast{position:fixed;bottom:6rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:300;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs,
         addDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const cfg = window.__MQ_CFG;
const app = getApps().length ? getApps()[0] : initializeApp(cfg);
const db  = getFirestore(app);

const params  = new URLSearchParams(location.search);
const venueId = params.get('v') || 'demo';
const tableId = params.get('t') || null;

let allItems = [], allCats = [], activeCat = null;
let cart = {}, detItem = null, detQty = 1, design = {};

const $ = id => document.getElementById(id);

async function init() {
  try {
    const [sSnap, dSnap, cSnap, iSnap] = await Promise.all([
      getDoc(doc(db,'venues',venueId,'settings','main')),
      getDoc(doc(db,'venues',venueId,'design','main')),
      getDocs(collection(db,'venues',venueId,'categories')),
      getDocs(collection(db,'venues',venueId,'items')),
    ]);

    applySettings(sSnap.exists() ? sSnap.data() : {});
    design = dSnap.exists() ? dSnap.data() : {};
    applyDesign(design);

    allCats  = cSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    allItems = iSnap.docs.map(d=>({id:d.id,...d.data()}));

    if (tableId) $('venue-tag').textContent += ` · Стіл №${tableId}`;
    activeCat = allCats[0]?.name || null;
    renderCats(); renderMenu();
  } catch(e) {
    console.error('init error:', e);
    $('menu-body').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div style="font-size:13px;margin-top:.5rem">Код помилки: <b>${e.code||'unknown'}</b></div><div style="font-size:11px;color:#999;margin-top:.375rem;padding:0 1rem;word-break:break-all">${e.message}</div></div>`;
  } finally {
    $('loader').classList.add('gone');
  }
}

function applySettings(s) {
  document.title = s.name || 'Меню';
  $('venue-name').textContent = s.name || 'Меню закладу';
  const parts = [s.tagline, s.city, s.phone].filter(Boolean);
  $('venue-tag').textContent  = parts.join(' · ');

  // Логотип
  if (s.logoUrl) {
    $('venue-logo').innerHTML = `<img src="${s.logoUrl}" alt="${s.name||''}"/>`;
  } else if (s.logoEmoji) {
    $('venue-logo').textContent = s.logoEmoji;
  }

  // Банер (окрема зона зверху)
  if (s.bannerUrl) {
    const img = $('banner-img');
    img.src = s.bannerUrl;
    img.style.display = 'block';
    $('banner-placeholder').style.display = 'none';
    // Колір акценту для placeholder якщо є
  } else {
    // Якщо немає банеру — ховаємо зону фото
    $('banner-photo').style.display = 'none';
  }

  // Колір акценту з дизайн-налаштувань вже застосований через applyDesign
}

function applyDesign(d) {
  const r = document.documentElement;
  if (d.accent)     r.style.setProperty('--accent', d.accent);
  if (d.bg)         r.style.setProperty('--bg', d.bg);
  if (d.card)       r.style.setProperty('--card', d.card);
  if (d.text)       r.style.setProperty('--text', d.text);
  if (d.fontSize)   r.style.setProperty('--font-size', d.fontSize+'px');
  if (d.cardRadius) r.style.setProperty('--radius', d.cardRadius+'px');
  if (d.fontHead) {
    r.style.setProperty('--font-head', `'${d.fontHead}',serif`);
    $('font-link').href = `https://fonts.googleapis.com/css2?family=${d.fontHead.replace(/ /g,'+')}:wght@500;600&family=${(d.fontBody||'DM Sans').replace(/ /g,'+')}:wght@300;400;500&display=swap`;
  }
  if (d.bannerUrl) {
    $('banner-bg').style.backgroundImage = `url(${d.bannerUrl})`;
    if (d.bannerOverlay) $('banner-ov').style.display = 'block';
  }
  if (d.bannerHeight) $('banner').style.minHeight = d.bannerHeight+'px';
}

function renderCats() {
  $('cat-bar').innerHTML = allCats.map(c=>
    `<button class="cat-pill${c.name===activeCat?' active':''}" onclick="setCat('${c.name}')">${c.emoji?c.emoji+' ':''}${c.name}</button>`
  ).join('');
}
window.setCat = name => { activeCat=name; renderCats(); renderMenu(); };

function renderMenu() {
  const list = activeCat ? allItems.filter(i=>i.category===activeCat) : allItems;
  if (!list.length) {
    $('menu-body').innerHTML = '<div class="empty"><div class="empty-icon">🍽️</div><div>У цій категорії немає страв</div></div>';
    return;
  }
  $('menu-body').innerHTML = list.map(it=>`
    <div class="dish-card" onclick="openDet('${it.id}')">
      ${it.photoUrl ? `<img class="dish-img" src="${it.photoUrl}" alt="${it.name}" loading="lazy"/>` : '<div class="dish-img-ph">🍽️</div>'}
      <div class="dish-body">
        <div class="dish-name">${it.name}</div>
        ${design.showDesc!==false&&it.desc?`<div class="dish-desc">${it.desc}</div>`:''}
        ${design.showWeight!==false&&it.weight?`<div class="dish-weight">⚖️ ${it.weight}</div>`:''}
        <div class="dish-footer">
          ${design.showPrices!==false?`<div class="dish-price">${it.price} грн</div>`:'<div></div>'}
          <button class="add-btn${cart[it.id]?' added':''}" id="ab-${it.id}" onclick="event.stopPropagation();qAdd('${it.id}')">${cart[it.id]?'✓':'+'}</button>
        </div>
      </div>
      ${cart[it.id]?`<div class="qty-chip">${cart[it.id]}</div>`:''}
    </div>`).join('');
}

window.openDet = id => {
  detItem = allItems.find(x=>x.id===id); if(!detItem) return;
  detQty = cart[id]||1;
  const img=$('det-img');
  if(detItem.photoUrl){img.src=detItem.photoUrl;img.style.display='block';}else img.style.display='none';
  $('det-name').textContent  = detItem.name;
  $('det-desc').textContent  = detItem.desc||'';
  $('det-price').textContent = detItem.price+' грн';
  $('det-qty').textContent   = detQty;
  $('det-ov').classList.add('open');
};
window.dQty = d => { detQty=Math.max(1,detQty+d); $('det-qty').textContent=detQty; };
window.addFromDet = () => {
  if(!detItem) return;
  cart[detItem.id]=detQty;
  $('det-ov').classList.remove('open');
  updateCart(); renderMenu();
  toast('✓ '+detItem.name+' додано');
};
window.qAdd = id => {
  cart[id]=(cart[id]||0)+1;
  const b=$('ab-'+id);
  if(b){b.classList.add('added');b.textContent='✓';setTimeout(()=>{b.classList.remove('added');b.textContent='+';},700);}
  updateCart();
};

function total(){ return Object.entries(cart).reduce((s,[id,q])=>{const it=allItems.find(x=>x.id===id);return it?s+it.price*q:s;},0); }
function count(){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function updateCart(){
  const n=count(),t=total();
  const fab=$('cart-fab');
  if(n>0){fab.classList.remove('hidden');$('cart-badge').textContent=n+' · '+t+' грн';}
  else fab.classList.add('hidden');
}
window.openCart = () => { renderCart(); $('cart-ov').classList.add('open'); };
window.closeCart = () => $('cart-ov').classList.remove('open');
function renderCart(){
  $('cart-list').innerHTML = Object.entries(cart).filter(([,q])=>q>0).map(([id,q])=>{
    const it=allItems.find(x=>x.id===id); if(!it) return '';
    return `<div class="cart-row">
      ${it.photoUrl?`<img class="c-img" src="${it.photoUrl}" alt="${it.name}"/>`:'<div class="c-img-ph">🍽️</div>'}
      <div class="c-info"><div class="c-name">${it.name}</div><div class="c-price">${it.price}×${q} = ${it.price*q} грн</div></div>
      <div class="c-qty">
        <button class="cq-btn" onclick="cQty('${id}',-1)">−</button>
        <div class="cq-val">${q}</div>
        <button class="cq-btn" onclick="cQty('${id}',1)">+</button>
      </div>
    </div>`;
  }).join('')||'<div style="color:var(--muted);text-align:center;padding:1rem;font-size:13px">Кошик порожній</div>';
  $('cart-total-val').textContent = total()+' грн';
}
window.cQty = (id,d) => {
  cart[id]=Math.max(0,(cart[id]||0)+d);
  if(!cart[id]) delete cart[id];
  updateCart(); count()>0?renderCart():closeCart();
};

window.placeOrder = async () => {
  if(!count()){toast('Кошик порожній');return;}
  const btn=$('order-btn'); btn.textContent='Відправляємо...'; btn.disabled=true;
  const num=Math.floor(Math.random()*9000)+1000;
  try {
    await addDoc(collection(db,'venues',venueId,'orders'),{
      items: Object.entries(cart).map(([id,qty])=>{const it=allItems.find(x=>x.id===id);return{id,name:it.name,price:it.price,qty};}),
      total: total(), status:'new', num,
      clientName: $('cli-name').value||'Гість',
      comment:    $('cli-comment').value||'',
      tableId:    tableId||null,
      createdAt:  serverTimestamp(),
    });
    cart={}; updateCart(); closeCart();
    $('s-num').textContent='#'+num;
    $('success').classList.add('open');
  } catch(e){ toast('Помилка: '+e.message); }
  finally{ btn.textContent='Замовити'; btn.disabled=false; }
};
window.resetSuccess = () => { $('success').classList.remove('open'); renderMenu(); };

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2500); }

init();
</script>
</body>
</html>
